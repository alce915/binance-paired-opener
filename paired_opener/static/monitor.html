<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binance Account Monitor</title>
  <style>
    :root {
      --bg: #f5efe3;
      --panel: rgba(255, 251, 245, 0.92);
      --panel-strong: #fffaf2;
      --line: rgba(60, 45, 22, 0.14);
      --text: #2d2418;
      --muted: #7f6f58;
      --accent: #b86b2b;
      --accent-soft: rgba(184, 107, 43, 0.12);
      --good: #1d7a43;
      --warn: #b26a00;
      --bad: #b43a2f;
      --shadow: 0 18px 50px rgba(71, 50, 18, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 153, 0.55), transparent 30%),
        radial-gradient(circle at top right, rgba(184, 107, 43, 0.18), transparent 25%),
        linear-gradient(180deg, #fbf5ea 0%, #f4ebde 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1200px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      display: grid;
      gap: 16px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 250, 242, 0.98), rgba(251, 241, 224, 0.9));
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.7;
    }

    .toolbar,
    .summary,
    .accounts {
      margin-top: 20px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 4px rgba(184, 107, 43, 0.14);
    }

    .status-ok { color: var(--good); background: rgba(29, 122, 67, 0.1); }
    .status-partial { color: var(--warn); background: rgba(178, 106, 0, 0.12); }
    .status-error { color: var(--bad); background: rgba(180, 58, 47, 0.12); }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .card,
    .account {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card {
      padding: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .accounts {
      display: grid;
      gap: 16px;
    }

    .account {
      overflow: hidden;
    }

    .account-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 248, 236, 0.84);
    }

    .account-title h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .account-title div {
      color: var(--muted);
      font-size: 14px;
    }

    .account-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 18px 22px;
    }

    .metric {
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid rgba(60, 45, 22, 0.08);
    }

    .metric .value {
      font-size: 22px;
    }

    .tables {
      display: grid;
      gap: 16px;
      padding: 0 22px 22px;
    }

    .section {
      border: 1px solid rgba(60, 45, 22, 0.08);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 253, 248, 0.84);
    }

    .section h3 {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(60, 45, 22, 0.08);
      font-size: 15px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(60, 45, 22, 0.06);
      text-align: left;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: rgba(255, 248, 238, 0.7);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .mono {
      font-family: Consolas, "SFMono-Regular", monospace;
    }

    .empty {
      padding: 20px 16px;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .shell {
        width: min(100vw - 20px, 1200px);
        padding-top: 20px;
      }

      .hero,
      .toolbar,
      .account-head,
      .account-grid,
      .tables {
        padding-left: 16px;
        padding-right: 16px;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="badge" id="connectionBadge">等待连接</div>
      <h1>Binance 统一账户监控台</h1>
      <p>这是独立部署的监控控制台，专门通过 SSE 持续接收已配置账户的统一账户快照，不影响现有开单页面和接口。</p>
    </section>

    <section class="toolbar">
      <div id="messageText">等待监控服务返回数据</div>
      <div class="mono" id="updatedAt">-</div>
    </section>

    <section class="summary" id="summaryCards"></section>
    <section class="accounts" id="accountsContainer"></section>
  </main>

  <script>
    const summaryCards = document.getElementById('summaryCards');
    const accountsContainer = document.getElementById('accountsContainer');
    const connectionBadge = document.getElementById('connectionBadge');
    const messageText = document.getElementById('messageText');
    const updatedAt = document.getElementById('updatedAt');

    const query = new URLSearchParams(window.location.search);
    const accountIds = query.get('accounts');
    const streamUrl = accountIds ? `/stream/accounts?account_ids=${encodeURIComponent(accountIds)}` : '/stream/accounts';
    const snapshotUrl = accountIds ? `/api/accounts?account_ids=${encodeURIComponent(accountIds)}` : '/api/accounts';

    function fmt(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toLocaleString('zh-CN', { maximumFractionDigits: 8 }) : String(value ?? '-');
    }

    function fmtTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function renderSummary(summary = {}) {
      const cards = [
        ['账户数', summary.account_count],
        ['正常', summary.success_count],
        ['异常', summary.error_count],
        ['总权益', fmt(summary.equity)],
        ['总保证金', fmt(summary.margin)],
        ['总可用余额', fmt(summary.available_balance)],
        ['总未实现盈亏', fmt(summary.unrealized_pnl)],
        ['收入汇总', fmt(summary.total_income)],
        ['利息汇总', fmt(summary.total_interest)],
      ];
      summaryCards.innerHTML = cards.map(([label, value]) => `
        <article class="card">
          <div class="label">${label}</div>
          <div class="value">${value ?? 0}</div>
        </article>
      `).join('');
    }

    function renderRows(headers, rows, formatter) {
      if (!rows || rows.length === 0) {
        return '<div class="empty">暂无数据</div>';
      }
      return `
        <table>
          <thead>
            <tr>${headers.map((header) => `<th>${header}</th>`).join('')}</tr>
          </thead>
          <tbody>
            ${rows.map((row) => formatter(row)).join('')}
          </tbody>
        </table>
      `;
    }

    function renderAccount(account) {
      const totals = account.totals || {};
      const incomeSummary = account.income_summary || {};
      const interestSummary = account.interest_summary || {};
      const sectionErrors = account.section_errors || {};
      const statusClass = account.status === 'ok' ? 'status-ok' : 'status-error';
      return `
        <article class="account">
          <div class="account-head">
            <div class="account-title">
              <h2>${account.account_name || account.account_id}</h2>
              <div class="mono">${account.account_id || '-'} | ${account.source || 'papi'} | ${account.account_status || '-'}</div>
            </div>
            <div class="badge ${statusClass}">${account.status || 'unknown'}</div>
          </div>
          <div class="account-grid">
            ${[
              ['总权益', fmt(totals.equity)],
              ['保证金', fmt(totals.margin)],
              ['可用余额', fmt(totals.available_balance)],
              ['未实现盈亏', fmt(totals.unrealized_pnl)],
              ['收入汇总', fmt(totals.total_income)],
              ['利息汇总', fmt(totals.total_interest)],
            ].map(([label, value]) => `
              <div class="metric">
                <div class="label">${label}</div>
                <div class="value">${value}</div>
              </div>
            `).join('')}
          </div>
          <div class="tables">
            <section class="section">
              <h3>持仓</h3>
              ${renderRows(
                ['交易对', '方向', '数量', '开仓价', '标记价', '未实现盈亏', '名义价值', '杠杆'],
                account.positions || [],
                (row) => `
                  <tr>
                    <td class="mono">${row.symbol || '-'}</td>
                    <td>${row.position_side || '-'}</td>
                    <td>${fmt(row.qty)}</td>
                    <td>${fmt(row.entry_price)}</td>
                    <td>${fmt(row.mark_price)}</td>
                    <td>${fmt(row.unrealized_pnl)}</td>
                    <td>${fmt(row.notional)}</td>
                    <td>${row.leverage || 0}x</td>
                  </tr>
                `
              )}
            </section>
            <section class="section">
              <h3>资产</h3>
              ${renderRows(
                ['资产', '钱包余额', '可用余额', '保证金余额', '未实现盈亏', '最大可提'],
                account.assets || [],
                (row) => `
                  <tr>
                    <td class="mono">${row.asset || '-'}</td>
                    <td>${fmt(row.wallet_balance)}</td>
                    <td>${fmt(row.available_balance)}</td>
                    <td>${fmt(row.margin_balance)}</td>
                    <td>${fmt(row.cross_unrealized_pnl)}</td>
                    <td>${fmt(row.max_withdraw_amount)}</td>
                  </tr>
                `
              )}
            </section>
            <section class="section">
              <h3>收益摘要</h3>
              <div class="empty">
                窗口 ${incomeSummary.window_days || 0} 天，记录 ${incomeSummary.records || 0} 条，收入汇总 ${fmt(incomeSummary.total_income)}。
                ${Object.keys(sectionErrors).length ? `<br>部分附加数据获取异常：${Object.entries(sectionErrors).map(([k, v]) => `${k}: ${v}`).join(' | ')}` : ''}
              </div>
            </section>
            <section class="section">
              <h3>利息摘要</h3>
              <div class="empty">
                窗口 ${interestSummary.window_days || 0} 天，记录 ${interestSummary.records || 0} 条，借贷利息 ${fmt(interestSummary.margin_interest_total)}，负余额利息 ${fmt(interestSummary.negative_balance_interest_total)}，利息汇总 ${fmt(interestSummary.total_interest)}。
              </div>
            </section>
          </div>
        </article>
      `;
    }

    function render(payload) {
      const status = payload.status || 'idle';
      connectionBadge.textContent = status;
      connectionBadge.className = `badge ${status === 'ok' ? 'status-ok' : status === 'partial' ? 'status-partial' : status === 'error' ? 'status-error' : ''}`;
      messageText.textContent = payload.message || '-';
      updatedAt.textContent = `更新时间 ${fmtTime(payload.updated_at)}`;
      renderSummary(payload.summary || {});
      const accounts = payload.accounts || [];
      accountsContainer.innerHTML = accounts.length ? accounts.map(renderAccount).join('') : '<article class="account"><div class="empty">暂无账户数据</div></article>';
    }

    async function bootstrap() {
      try {
        const response = await fetch(snapshotUrl, { cache: 'no-store' });
        if (response.ok) {
          render(await response.json());
        }
      } catch (error) {
        messageText.textContent = `初始化失败: ${error}`;
      }

      const source = new EventSource(streamUrl);
      source.addEventListener('accounts_snapshot', (event) => {
        render(JSON.parse(event.data));
      });
      source.onerror = () => {
        connectionBadge.textContent = 'reconnecting';
        connectionBadge.className = 'badge status-partial';
      };
    }

    bootstrap();
  </script>
</body>
</html>
